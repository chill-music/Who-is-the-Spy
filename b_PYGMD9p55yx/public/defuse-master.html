<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Defuse Master</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #root {
      width: 100%;
      height: 100%;
    }
    /* Loading state */
    .loading-screen {
      min-height: 100vh;
      background: linear-gradient(160deg, #5B2D8E 0%, #3A1A6E 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Defuse Master...</div>
    </div>
  </div>

  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase 10 Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <!-- Firebase Config - Replace with your config -->
  <script>
    (function() {
      // Check if already initialized
      if (window.firebase && window.firebase.apps && window.firebase.apps.length > 0) {
        return;
      }
      
      // Initialize Firebase with config from environment or defaults
      var firebaseConfig = {
        apiKey: window.FIREBASE_API_KEY || "YOUR_API_KEY",
        authDomain: window.FIREBASE_AUTH_DOMAIN || "YOUR_PROJECT.firebaseapp.com",
        projectId: window.FIREBASE_PROJECT_ID || "YOUR_PROJECT_ID",
        storageBucket: window.FIREBASE_STORAGE_BUCKET || "YOUR_PROJECT.appspot.com",
        messagingSenderId: window.FIREBASE_MESSAGING_SENDER_ID || "000000000000",
        appId: window.FIREBASE_APP_ID || "1:000000000000:web:0000000000000000"
      };
      
      firebase.initializeApp(firebaseConfig);
      console.log('[DefuseMaster] Firebase initialized');
    })();
  </script>

  <!-- Game Scripts (IIFE pattern) -->
  <script src="/defuse-cards.js"></script>
  <script src="/defuse-rules.js"></script>
  <script src="/DefuseLobby.js"></script>
  <script src="/DefuseGame.js"></script>
  <script src="/DefuseResults.js"></script>
  <script src="/DefuseMaster.js"></script>

  <!-- Mount the app -->
  <script>
    (function() {
      'use strict';
      
      // Wait for all scripts to load
      function init() {
        if (!window.DefuseMaster) {
          console.error('[DefuseMaster] DefuseMaster component not loaded');
          return;
        }
        
        var root = document.getElementById('root');
        var reactRoot = ReactDOM.createRoot(root);
        
        // Get room code from URL if present
        var urlParams = new URLSearchParams(window.location.search);
        var roomCode = urlParams.get('room');
        
        reactRoot.render(
          React.createElement(window.DefuseMaster, {
            initialRoomId: roomCode
          })
        );
        
        console.log('[DefuseMaster] App mounted');
      }
      
      // Initialize when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
