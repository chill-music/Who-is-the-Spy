<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: white; display: flex; gap: 20px; padding: 50px; }
  .box { position: relative; width: 200px; border: 1px solid red; }
  .box img.frame { width: 100%; display: block; }
  .avatar { 
    position: absolute; 
    border-radius: 50%; 
    background: rgba(0, 255, 0, 0.5); 
    transform: translate(-50%, -50%);
  }
  
  /* Rank 1 */
  .rank1 .avatar { width: 32%; padding-top: 32%; top: 45%; left: 50%; }
  
  /* Rank 2 */
  .rank2 .avatar { width: 35%; padding-top: 35%; top: 33%; left: 50%; }
  
  /* Rank 3 */
  .rank3 .avatar { width: 36%; padding-top: 36%; top: 34.5%; left: 49.5%; }
  
</style>
</head>
<body>
  <div class="box rank1">
    <img class="frame" src="icos/leaderboard tops/leaderboard top 1.png">
    <div class="avatar"></div>
  </div>
  <div class="box rank2">
    <img class="frame" src="icos/leaderboard tops/leaderboard top 2.png">
    <div class="avatar"></div>
  </div>
  <div class="box rank3">
    <img class="frame" src="icos/leaderboard tops/leaderboard top 3.png">
    <div class="avatar"></div>
  </div>
</body>
</html>
