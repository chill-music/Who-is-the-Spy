<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defuse Master - Standalone Test</title>

    <!-- 🛡️ SECURITY HARDENING (CSP + ANTI-CLICKJACKING) -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://*.firebaseio.com https://*.firebaseapp.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://*.googleapis.com https://unpkg.com https://cdn.jsdelivr.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.firebaseapp.com https://*.googleapis.com https://www.gstatic.com https://unpkg.com wss://*.firebaseio.com;">
    <script>
        /* Anti-Clickjacking Frame-Buster */
        (function () {
            if (self !== top) {
                top.location.replace(self.location.href);
            }
        })();
    </script>

    
    <!-- React & ReactDOM (Matching Project Versions) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX (Needed because we are loading .jsx directly in standalone mode) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1A0A3C;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #root {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- The Game Component (IIFE) -->
    <script type="text/babel" src="./DefuseMaster.jsx?v=standalone"></script>

    <!-- Mount Script -->
    <script type="text/babel">
        const { useEffect } = React;
        
        function App() {
            // DefuseMasterApp is exposed via window by our IIFE
            const Game = window.DefuseMasterApp;
            
            if (!Game) {
                return (
                    <div style={{color: 'white', padding: 20, textAlign: 'center'}}>
                        <h2>Loading Game...</h2>
                        <p>If this persists, check console for errors.</p>
                    </div>
                );
            }

            return <Game config={null} onEnd={(res) => console.log('Game Ended:', res)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Simple check to remount if IIFE loaded late
        let checkCount = 0;
        const interval = setInterval(() => {
            if (window.DefuseMasterApp || checkCount > 20) {
                root.render(<App />);
                clearInterval(interval);
            }
            checkCount++;
        }, 500);
    </script>
</body>
</html>
