<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO SPY | Covert Arena</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕵️</text></svg>">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- 👑 VIP System CSS -->
    <link rel="stylesheet" href="vip.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <!-- ⚡ Instant loading screen — shows before React boots, hides after -->
    <div id="app-loader" style="
        position:fixed;inset:0;z-index:999999;
        background:linear-gradient(160deg,#05051a,#0a081f);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    ">
        <div style="font-size:52px;animation:ldr_pulse 1.2s ease-in-out infinite">🕵️</div>
        <div style="
            font-size:22px;font-weight:900;letter-spacing:2px;
            background:linear-gradient(90deg,#00f2ff,#7000ff);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        ">PRO SPY</div>
        <div style="width:160px;height:3px;background:rgba(255,255,255,0.07);border-radius:9px;overflow:hidden">
            <div id="ldr-bar" style="height:100%;width:0%;border-radius:9px;background:linear-gradient(90deg,#00f2ff,#7000ff);transition:width 0.4s ease"></div>
        </div>
        <div id="ldr-txt" style="font-size:11px;color:#4b5563;letter-spacing:1px">LOADING...</div>
        <style>@keyframes ldr_pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}</style>
    </div>

    <div id="root"></div>

    <script>
        // Progress bar simulation while scripts load
        let _p = 0;
        const _bar = document.getElementById('ldr-bar');
        const _txt = document.getElementById('ldr-txt');
        const _iv  = setInterval(() => {
            _p = Math.min(_p + (Math.random() * 8), 88);
            if (_bar) _bar.style.width = _p + '%';
        }, 200);
        window._hideLoader = () => {
            clearInterval(_iv);
            const loader = document.getElementById('app-loader');
            if (!loader) return;
            if (_bar) _bar.style.width = '100%';
            setTimeout(() => {
                loader.style.transition = 'opacity 0.4s ease';
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 420);
            }, 200);
        };
    </script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!--
    ════════════════════════════════════════════════════════════
      PRO SPY — Source Files (load order matters!)
      Each file depends on everything loaded before it.
    ════════════════════════════════════════════════════════════
    -->

    <!-- 01 · Constants, Firebase, Collections -->
    <script type="text/babel" src="src/01-config.js"></script>

    <!-- 02 · Audio System -->
    <script type="text/babel" src="src/02-audio.js"></script>

    <!-- 03 · Data: FunPass, Login Rewards -->
    <script type="text/babel" src="src/03-data-funpass.js"></script>

    <!-- 04 · Data: Shop, Achievements, Scenarios, Helpers -->
    <script type="text/babel" src="src/04-data-game.js"></script>

    <!-- 05 · Translations (AR / EN) -->
    <script type="text/babel" src="src/05-translations.js"></script>

    <!-- 06 · Base UI Components -->
    <script type="text/babel" src="src/06-components-base.js"></script>

    <!-- 07 · Gift Components -->
    <script type="text/babel" src="src/07-components-gifts.js"></script>

    <!-- 08 · Shop & Inventory -->
    <script type="text/babel" src="src/08-components-shop.js"></script>

    <!-- 👑 17 · VIP System — must load before 09+ which uses VIP helpers -->
    <script type="text/babel" src="src/17-vip.js"></script>

    <!-- 09 · User Components (Onboarding, Daily Tasks, Login Rewards) -->
    <script type="text/babel" src="src/09-components-user.js"></script>

    <!-- 10 · App() — Main Logic -->
    <script type="text/babel" src="src/10-app.js"></script>

    <!-- 11 · Self Chat Modal -->
    <script type="text/babel" src="src/11-modal-selfchat.js"></script>

    <!-- 12 · FunPass Modal -->
    <script type="text/babel" src="src/12-modal-funpass.js"></script>

    <!-- 13 · Private Chat Modal -->
    <script type="text/babel" src="src/13-modal-chat.js"></script>

    <!-- 14 · Misc Modals (Settings, Browse Rooms, Tutorial, Login Rewards) -->
    <script type="text/babel" src="src/14-modals-misc.js"></script>

    <!-- 15 · Profile V11 + All Moments Components -->
    <script type="text/babel" src="src/15-profile.js"></script>

    <!-- 16 · Entry Point — render app -->
    <script type="text/babel" src="src/16-main.js"></script>

</body>
</html>
