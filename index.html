        /* Change this version number whenever you update the site to force all mobile caches to flush! */
        window.PRO_SPY_VERSION = "2.1"; 
        
        // Intercept XMLHttpRequest (used by Babel standalone)
        var originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            if (typeof url === 'string' && url.startsWith('src/') && !url.includes('?v=')) {
                var sep = url.includes('?') ? '&' : '?';
                url = url + sep + 'v=' + window.PRO_SPY_VERSION;
            }
            return originalXHROpen.apply(this, arguments);
        };
        
        // Intercept Fetch API (for regular assets)
        var originalFetch = window.fetch;
        window.fetch = function(url, options) {
            if (typeof url === 'string' && url.startsWith('src/') && !url.includes('?v=')) {
                var sep = url.includes('?') ? '&' : '?';
                url = url + sep + 'v=' + window.PRO_SPY_VERSION;
            }
            return originalFetch.call(this, url, options);
        };
    </script>

    <div id="app-boot-screen" style="

        display:flex;flex-direction:column;align-items:center;justify-content:center;

        <div style="font-size:64px;margin-bottom:16px;animation:boot-pulse 1.2s ease-in-out infinite;">🕵️</div>

        <div style="color:#6366f1;font-size:13px;margin-bottom:32px;opacity:.8;">Covert Arena</div>
        <div style="width:180px;height:3px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;">
            <div id="boot-progress" style="height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#06b6d4);border-radius:4px;transition:width .3s ease;"></div>
        </div>
    </div>
    <style>
        @keyframes boot-pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.08);opacity:1}}
        #app-boot-screen.hidden{opacity:0;pointer-events:none;transition:opacity .4s ease .1s;}
    </style>
    <script>
        /* Animate the progress bar while scripts load */
        var _bp=document.getElementById('boot-progress'),_bv=0;
        var _bi=setInterval(function(){
            _bv=Math.min(_bv+(Math.random()*3+0.5),88);
            if(_bp)_bp.style.width=_bv+'%';
        },200);
        window.__hideBootScreen=function(){
            clearInterval(_bi);
            if(_bp)_bp.style.width='100%';
            setTimeout(function(){
                var el=document.getElementById('app-boot-screen');
                if(el){el.classList.add('hidden');setTimeout(function(){el.remove();},500);}
            },150);
        };
    </script>
