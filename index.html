    <!-- ⚡ BOOTSTRAPPER: Fast Version Check (FVC) ⚡ -->
    <script>
        (function () {
            // Configuration matching src/01-config.js
            var APP_ID = 'pro_spy_v25_final_fix_complete';
            var FIREBASE_PROJECT = 'who-is-the-spy-919b9';
            var LOCAL_VER = localStorage.getItem('pro_spy_version');

            // Only run FVC if we are NOT already snoozing or just reloaded
            if (sessionStorage.getItem('pro_spy_fvc_check_running')) return;

            // Minimal Firestore REST Fetch
            var docUrl = 'https://firestore.googleapis.com/v1/projects/' + FIREBASE_PROJECT +
                '/databases/(default)/documents/artifacts/' + APP_ID +
                '/public/data/config/versioning';

            window.PRO_SPY_FVC_ACTIVE = true;

            fetch(docUrl).then(function (r) { return r.json(); }).then(function (res) {
                var data = res.fields || {};
                var remoteVer = data.remote_version ? data.remote_version.stringValue : null;
                var isCritical = data.critical ? data.critical.booleanValue : false;

                if (remoteVer && remoteVer !== LOCAL_VER) {
                    console.warn("[FVC] Version mismatch detected early:", LOCAL_VER, "->", remoteVer);

                    // If critical or first time, force update immediately
                    if (isCritical || !LOCAL_VER) {
                        localStorage.setItem('pro_spy_version', remoteVer);

                        // Clear PWA caches immediately
                        if ('caches' in window) caches.keys().then(function (keys) {
                            keys.forEach(function (k) { caches.delete(k); });
                        });

                        // Unregister SW
                        if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function (regs) {
                            regs.forEach(function (r) { r.unregister(); });
                        });

                        // Important: Clear sessionStorage update flags to allow new logic to run
                        sessionStorage.removeItem('pro_spy_update_attempted');

                        // Show "Updating" status on boot screen
                        var progress = document.getElementById('boot-progress');
                        if (progress) {
                            progress.style.width = '100%';
                            progress.style.background = 'linear-gradient(90deg, #ef4444, #f59e0b)';
                        }

                        // Reload with cache buster
                        setTimeout(function () {
                            window.location.href = window.location.origin + window.location.pathname + '?v=' + Date.now();
                        }, 500);

                        // Block further script execution
                        window.stop();
                    }
                }
            }).catch(function (err) {
                console.warn("[FVC] Version check skipped (offline or error)");
            }).finally(function () {
                window.PRO_SPY_FVC_ACTIVE = false;
                sessionStorage.setItem('pro_spy_fvc_check_running', 'done');
            });
        })();
    </script>

    <!-- ⚡ ULTIMATE CACHE-BUSTING INTERCEPTOR ⚡ -->
    <script>
        window.PRO_SPY_VERSION = localStorage.getItem('pro_spy_version') || null;

        /**
         * Dynamic Script Loader with Order Preservation
         * Replaces static script tags to ensure every single source file is version-busted.
         */
        window.loadAppScript = function (src) {
            var s = document.createElement('script');
            var sep = src.indexOf('?') !== -1 ? '&' : '?';
            s.src = src + (window.PRO_SPY_VERSION ? sep + 'v=' + window.PRO_SPY_VERSION : '');
            s.defer = true;
            s.async = false; // ⚠️ CRITICAL: Preserves loading order
            document.head.appendChild(s);
        };

        /**
         * Dynamic Style Loader
         */
        window.loadAppStyle = function (src) {
            var l = document.createElement('link');
            var sep = src.indexOf('?') !== -1 ? '&' : '?';
            l.rel = 'stylesheet';
            l.href = src + (window.PRO_SPY_VERSION ? sep + 'v=' + window.PRO_SPY_VERSION : '');
            document.head.appendChild(l);
        };


        function shouldBust(url) {
            if (typeof url !== 'string' || !window.PRO_SPY_VERSION) return false;
            // Normalize path for check (strip leading slash/dot)
            var cleanUrl = url.replace(/^\.\//, '').replace(/^\//, '');
            var isLocal = cleanUrl.startsWith('src/') || cleanUrl.startsWith('icos/') || cleanUrl.endsWith('.css');
            var isApi = url.indexOf('firebase') !== -1 || url.indexOf('googleapis') !== -1 || url.indexOf('http') === 0 && url.indexOf(window.location.host) === -1;
            return isLocal && !isApi;
        }

        // Intercept XMLHttpRequest
        var originalXHROpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url) {
            if (shouldBust(url)) {
                var sep = url.indexOf('?') !== -1 ? '&' : '?';
                url = url + sep + 'v=' + (window.PRO_SPY_VERSION || Date.now());
            }
            return originalXHROpen.apply(this, [method, url].concat(Array.prototype.slice.call(arguments, 2)));
        };

        // Intercept Fetch API
        var originalFetch = window.fetch;
        window.fetch = function (resource, options) {
            var url = (resource instanceof Request) ? resource.url : resource;
            if (shouldBust(url)) {
                var sep = url.indexOf('?') !== -1 ? '&' : '?';
                url = url + sep + 'v=' + (window.PRO_SPY_VERSION || Date.now());
                if (resource instanceof Request) resource = new Request(url, resource);
                else resource = url;
            }
            return originalFetch.call(this, resource, options);
        };
    </script>
