<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO SPY | Covert Arena</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕵️</text></svg>">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css"><!-- minified -->

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7000ff">
    <link rel="apple-touch-icon" href="icos/icon-192.png">

    <!-- Firebase -->
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <!-- 👑 VIP System CSS -->
    <link rel="stylesheet" href="vip.css">
</head>
<body>
    <div id="root"></div>

    <!--
    ════════════════════════════════════════════════════════════
      PRO SPY — Source Files (load order matters!)
      Each file depends on everything loaded before it.
    ════════════════════════════════════════════════════════════
    -->

    <!-- 01 · Constants, Firebase, Collections -->
    <script src="src/01-config.js"></script>
    <script src="src/utils/format.js"></script>
    <script src="src/features/profile/ProfileHelpers.js"></script>
    <script src="src/features/pwa/PWAHandler.js"></script>

    <!-- 02 · Audio System -->
    <script src="src/02-audio.js"></script>

    <!-- 03 · Data: FunPass, Login Rewards -->
    <script src="src/03-data-funpass.js"></script>

    <!-- 04 · Data: Shop, Achievements, Scenarios, Helpers -->
    <script src="src/04-data-game.js"></script>

    <!-- 05 · Translations (AR / EN) -->
    <script type="text/babel" data-presets="react" src="src/05-translations.js"></script>

    <!-- 06 · Base UI Components -->
    <script type="text/babel" data-presets="react" src="src/06-components-base.js"></script>

    <!-- 07 · Gift Components -->
    <script type="text/babel" data-presets="react" src="src/07-components-gifts.js"></script>

    <!-- 👑 17 · VIP System — must load before 08+ which uses VIP helpers -->
    <script type="text/babel" data-presets="react" src="src/17-vip.js"></script>

    <!-- 08 · Shop & Inventory -->
    <script type="text/babel" data-presets="react" src="src/08-components-shop.js"></script>

    <!-- Family System Core (must load before components that use them) -->
    <script type="text/babel" data-presets="react" src="src/features/family/FamilyConstants.js"></script>
    <script type="text/babel" data-presets="react" src="src/features/family/components/FamilySignBadge.js"></script>

    <!-- 09 · User Components (Onboarding, Daily Tasks, Login Rewards) -->
    <script type="text/babel" data-presets="react" src="src/09-components-user.js"></script>

    <!-- Core App Logic -->
    <script type="text/babel" data-presets="react" src="src/app/useAuthState.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/usePresence.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/useNotifications.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/useRoom.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/useLeaderboards.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/useSocial.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/useGameAutomation.js"></script>
    <script type="text/babel" data-presets="react" src="src/app/useBots.js"></script>
    <script type="text/babel" data-presets="react" src="src/10-app.js"></script>

    <!-- 11 · Self Chat Modal -->
    <script type="text/babel" data-presets="react" src="src/11-modal-selfchat.js"></script>

    <!-- 12 · FunPass Modal -->
    <script type="text/babel" data-presets="react" src="src/12-modal-funpass.js"></script>

    <!-- 13 · Private Chat Modal -->
    <script type="text/babel" data-presets="react" src="src/13-modal-chat.js"></script>

    <!-- 14 · Misc Modals (Settings, Browse Rooms, Tutorial, Login Rewards) (DEPRECATED: Now in src/components/modals/) -->
    <script defer type="text/babel" data-presets="react" src="src/components/modals/LoginRewards.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/BrowseRoomsModal.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/TutorialModal.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/SettingsModal.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/SupportTicketSection.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/lobby/LobbyPublicChatBox.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/VIPCenterModal.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/HelpCenterModal.js"></script>
    <script defer type="text/babel" data-presets="react" src="src/components/modals/PublicChatModal.js"></script>

    <!-- Profile System Bundle (Consolidated 15 Modules) -->
    <script defer type="text/babel" data-presets="react" src="src/bundles/profile-system-bundle.js"></script>

    <!-- Admin System Bundle (Consolidated 16 Modules) -->
    <script defer type="text/babel" data-presets="react" src="src/bundles/admin-system-bundle.js"></script>

    <!-- Family System Bundle (Consolidated 20 Modules) -->
    <script defer type="text/babel" data-presets="react" src="src/bundles/family-system-bundle.js"></script>

    <!-- 20 · Couples / Marriage System -->
    <script defer type="text/babel" data-presets="react" src="src/20-couples.js"></script>

    <!-- 21 · BFF System + Bot Chats — must load BEFORE 16-main renders -->
    <script defer type="text/babel" data-presets="react" src="src/21-bff.js"></script>

    <!-- 16 · Entry Point — render app (always last) -->
    <script type="text/babel" data-presets="react" src="src/16-main.js"></script>

</body>
</html>
