<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #c9c9e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
  }

  .card {
    width: 340px;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    background: #fff;
  }

  /* ── Top banner with avatars ── */
  .banner {
    width: 100%;
    height: 180px;
    background: linear-gradient(160deg, #b8c8f8 0%, #d4c0f0 50%, #c8d8f8 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 0;
  }

  /* animated sparkle dots */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle 2px at 20% 30%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(circle 2px at 55% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(circle 1.5px at 75% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(circle 1px at 35% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(circle 2px at 85% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(circle 1px at 10% 70%, rgba(255,255,255,0.5) 0%, transparent 100%);
    pointer-events: none;
    animation: twinkle 3s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  .avatars {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
    position: relative;
    z-index: 2;
  }

  .avatar-char {
    width: 120px;
    height: 150px;
    position: relative;
  }

  /* Boy avatar – orange hoodie, cat ears, sunglasses */
  .boy-body {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 75px; height: 95px;
    background: linear-gradient(180deg, #ff8c00 0%, #e07000 100%);
    border-radius: 18px 18px 12px 12px;
  }
  .boy-body::before { /* collar/chain area */
    content: '';
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 18px;
    background: #fff;
    border-radius: 50% 50% 0 0;
  }
  .boy-neck {
    position: absolute;
    bottom: 95px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 16px;
    background: #f4c18a;
    border-radius: 4px;
  }
  .boy-head {
    position: absolute;
    bottom: 108px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 54px;
    background: linear-gradient(180deg, #f9d49a 0%, #f0b870 100%);
    border-radius: 50% 50% 46% 46%;
  }
  /* hair */
  .boy-hair {
    position: absolute;
    bottom: 148px; left: 50%;
    transform: translateX(-50%);
    width: 62px; height: 32px;
    background: linear-gradient(180deg, #e8c840 0%, #c8a820 100%);
    border-radius: 50% 50% 0 0;
  }
  /* sunglasses */
  .boy-glasses {
    position: absolute;
    bottom: 126px; left: 50%;
    transform: translateX(-50%);
    width: 52px; height: 14px;
    background: linear-gradient(90deg, #d4a0f0aa, #b080d0aa);
    border-radius: 20px;
    border: 1.5px solid #a060c0;
  }
  /* cat ears */
  .ear { position: absolute; width: 14px; height: 18px; }
  .ear-left  { bottom: 156px; left: calc(50% - 32px); background: #e8c840; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); border-radius: 2px; }
  .ear-right { bottom: 156px; left: calc(50% + 18px); background: #e8c840; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); border-radius: 2px; }
  .ear-left::after, .ear-right::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 10px;
    background: #ffb0b0;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }
  /* arm */
  .boy-arm {
    position: absolute;
    bottom: 18px; left: calc(50% - 46px);
    width: 18px; height: 50px;
    background: linear-gradient(180deg, #ff8c00, #e07000);
    border-radius: 10px;
    transform: rotate(-6deg);
  }

  /* Girl avatar */
  .girl-body {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 75px; height: 95px;
    background: linear-gradient(180deg, #fff 0%, #f5f5f5 100%);
    border-radius: 18px 18px 12px 12px;
    border: 1.5px solid #f0e0f0;
  }
  .girl-shirt-accent {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 34px; height: 28px;
    background: #ff4466;
    border-radius: 4px;
    opacity: 0.9;
  }
  .girl-neck {
    position: absolute;
    bottom: 95px; left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 16px;
    background: #ffc8c8;
    border-radius: 4px;
  }
  .girl-head {
    position: absolute;
    bottom: 108px; left: 50%;
    transform: translateX(-50%);
    width: 54px; height: 54px;
    background: linear-gradient(180deg, #ffd8d8 0%, #ffb8b8 100%);
    border-radius: 50%;
  }
  .girl-hair {
    position: absolute;
    bottom: 142px; left: 50%;
    transform: translateX(-50%);
    width: 66px; height: 40px;
    background: linear-gradient(180deg, #e870b8 0%, #d050a0 100%);
    border-radius: 50% 50% 30% 30%;
  }
  /* flowing hair */
  .girl-hair-side {
    position: absolute;
    bottom: 100px; left: calc(50% - 38px);
    width: 18px; height: 55px;
    background: linear-gradient(180deg, #e870b8, #c040a0);
    border-radius: 20px;
  }
  .girl-hair-side-r {
    position: absolute;
    bottom: 100px; left: calc(50% + 20px);
    width: 18px; height: 55px;
    background: linear-gradient(180deg, #e870b8, #c040a0);
    border-radius: 20px;
  }
  /* cat ears girl */
  .gear-left  { bottom: 158px; left: calc(50% - 30px); background: #fff; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .gear-right { bottom: 158px; left: calc(50% + 16px); background: #fff; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  /* girl eyes */
  .girl-eye-l, .girl-eye-r {
    position: absolute;
    bottom: 126px;
    width: 14px; height: 16px;
    background: radial-gradient(circle at 40% 35%, #9080e8 0%, #5040c0 60%, #201080 100%);
    border-radius: 50%;
    border: 1.5px solid #fff;
  }
  .girl-eye-l { left: calc(50% - 20px); }
  .girl-eye-r { left: calc(50% + 6px); }
  /* waving arm */
  .girl-arm {
    position: absolute;
    bottom: 50px; left: calc(50% + 28px);
    width: 16px; height: 48px;
    background: #ffc8c8;
    border-radius: 10px;
    transform: rotate(30deg) translateY(-10px);
    transform-origin: bottom center;
    animation: wave 1.5s ease-in-out infinite alternate;
  }
  @keyframes wave {
    from { transform: rotate(25deg) translateY(-10px); }
    to   { transform: rotate(45deg) translateY(-16px); }
  }

  /* CP label */
  .cp-label {
    position: absolute;
    bottom: 28px; right: 0;
    display: flex;
    align-items: center;
    z-index: 10;
  }
  .cp-pill {
    background: rgba(70,70,80,0.82);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px 6px 14px;
    border-radius: 20px 0 0 20px;
    backdrop-filter: blur(6px);
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .cp-avatar-wrap {
    position: relative;
    width: 58px; height: 58px;
    flex-shrink: 0;
    margin-right: -20px; /* partially cut off at right edge */
  }
  /* outer blue tech ring */
  .cp-avatar-wrap::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(
      #00e5ff 0deg, #0080ff 60deg, #00e5ff 120deg,
      #004080 160deg, #00e5ff 220deg, #0080ff 280deg,
      #00e5ff 360deg
    );
    animation: spinCP 3s linear infinite;
  }
  @keyframes spinCP {
    to { transform: rotate(360deg); }
  }
  /* inner gap ring */
  .cp-avatar-wrap::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: #0a0a18;
    z-index: 1;
  }
  .cp-thumb {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
    background: linear-gradient(135deg, #1a2a3a, #0a1520);
  }
  /* HUD scan line inside avatar */
  .cp-thumb::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: rgba(0,200,255,0.6);
    top: 0;
    animation: scanLine 2s linear infinite;
  }
  @keyframes scanLine {
    from { top: 0; opacity: 1; }
    to   { top: 100%; opacity: 0; }
  }
  .cp-thumb-inner {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a3a5a 0%, #0a2030 40%, #1a3040 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    filter: brightness(0.85) saturate(0.7);
  }
  /* glowing blue dots on ring */
  .cp-hud-dot {
    position: absolute;
    width: 5px; height: 5px;
    background: #00e5ff;
    border-radius: 50%;
    box-shadow: 0 0 6px #00e5ff, 0 0 12px #0080ff;
    z-index: 3;
  }
  .cp-hud-dot:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
  .cp-hud-dot:nth-child(2) { bottom: 4px; right: 4px; }
  .cp-hud-dot:nth-child(3) { top: 50%; left: -1px; transform: translateY(-50%); }

  /* ── Body card ── */
  .body {
    background: #fff;
    border-radius: 28px 28px 0 0;
    margin-top: -20px;
    position: relative;
    z-index: 5;
    padding: 20px 18px 0;
  }

  /* badge row top-right */
  .badge-row {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 14px;
  }

  .badge-icon {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffe080, #ffb020);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 3px 10px rgba(255,160,0,0.4);
    border: 2px solid #ffd040;
  }

  /* profile row */
  .profile-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 20px;
  }

  /* flame avatar */
  .flame-avatar {
    position: relative;
    width: 90px;
    height: 90px;
    flex-shrink: 0;
  }

  .flame-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      #ff6000, #ffd000, #ff8800, #ffdd00,
      #ff5000, #ffcc00, #ff7000, #ffe000, #ff6000
    );
    animation: spinRing 4s linear infinite;
    padding: 3px;
  }

  @keyframes spinRing {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .flame-ring-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .avatar-pic {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  /* wings decoration */
  .wings {
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 22px;
    background: linear-gradient(90deg, transparent, #ffd000 30%, #ff8800 50%, #ffd000 70%, transparent);
    clip-path: polygon(10% 100%, 0% 0%, 28% 60%, 50% 0%, 72% 60%, 100% 0%, 90% 100%);
    opacity: 0.9;
    animation: glowWings 2s ease-in-out infinite alternate;
  }
  @keyframes glowWings {
    from { filter: brightness(1); }
    to   { filter: brightness(1.4) drop-shadow(0 0 4px #ffaa00); }
  }

  /* user info */
  .user-info { flex: 1; padding-top: 4px; }

  .user-name {
    font-size: 22px;
    font-weight: 900;
    color: #1a1a2a;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .user-name .rank-num {
    font-size: 13px;
    font-weight: 700;
    color: #888;
  }
  .user-name .gender-icon {
    color: #4499ff;
    font-size: 18px;
  }

  .badges-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .diamond-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    background: linear-gradient(135deg, #40c8ff, #0080ff);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,128,255,0.4);
  }
  .diamond-badge span { font-size: 14px; }

  .calm-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: linear-gradient(135deg, #8b6914, #c9930a, #8b6914);
    color: #ffe080;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid #ffd050;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 6px rgba(0,0,0,0.3);
  }
  .calm-badge::before {
    content: '🛡️';
    font-size: 13px;
  }

  .user-id {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #888;
    font-size: 13px;
    font-weight: 600;
  }
  .copy-btn {
    width: 18px; height: 18px;
    background: #eee;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    cursor: pointer;
    color: #888;
    border: none;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: #ddd; }

  /* ── Stats row ── */
  .stats {
    display: flex;
    align-items: center;
    border-top: 1px solid #f0f0f0;
    margin: 0 -18px;
    padding: 16px 0 18px;
  }

  .stat {
    flex: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat + .stat {
    border-left: 1px solid #f0f0f0;
  }

  .stat-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b0b0b8, #888898);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 900;
    color: #1a1a2a;
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
  }

  /* ── Send Gift button ── */
  .gift-btn {
    display: block;
    width: calc(100% + 0px);
    margin: 0 0 0 0;
    padding: 18px;
    background: linear-gradient(135deg, #ff80a0, #ff4477);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 8px 24px rgba(255,70,120,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    margin-bottom: 18px;
  }
  .gift-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(255,70,120,0.55);
  }
  .gift-btn:active { transform: translateY(0); }
</style>
</head>
<body>

<div class="card">

  <!-- Banner -->
  <div class="banner">
    <!-- Boy -->
    <div class="avatar-char" style="margin-right:-10px; z-index:2;">
      <div class="ear ear-left"></div>
      <div class="ear ear-right"></div>
      <div class="boy-hair"></div>
      <div class="boy-glasses"></div>
      <div class="boy-head"></div>
      <div class="boy-neck"></div>
      <div class="boy-body"></div>
      <div class="boy-arm"></div>
    </div>
    <!-- Girl -->
    <div class="avatar-char" style="z-index:3;">
      <div class="ear gear-left ear" style="position:absolute; width:14px; height:18px; bottom:158px; left:calc(50% - 30px); background:#fff; clip-path:polygon(50% 0%, 0% 100%, 100% 100%);"></div>
      <div class="ear gear-right ear" style="position:absolute; width:14px; height:18px; bottom:158px; left:calc(50% + 16px); background:#fff; clip-path:polygon(50% 0%, 0% 100%, 100% 100%);"></div>
      <div class="girl-hair"></div>
      <div class="girl-hair-side"></div>
      <div class="girl-hair-side-r"></div>
      <div class="girl-eye-l"></div>
      <div class="girl-eye-r"></div>
      <div class="girl-head"></div>
      <div class="girl-neck"></div>
      <div class="girl-body">
        <div class="girl-shirt-accent"></div>
      </div>
      <div class="girl-arm"></div>
    </div>
    <!-- CP label -->
    <div class="cp-label">
      <div class="cp-pill">His/Her CP</div>
      <div class="cp-avatar-wrap">
        <div class="cp-hud-dot"></div>
        <div class="cp-hud-dot"></div>
        <div class="cp-hud-dot"></div>
        <div class="cp-thumb">
          <div class="cp-thumb-inner">🧑</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Badges top right -->
    <div class="badge-row">
      <div class="badge-icon">🏅</div>
      <div class="badge-icon">🏠</div>
      <div class="badge-icon">🥇</div>
    </div>

    <!-- Profile row -->
    <div class="profile-row">
      <div class="flame-avatar">
        <div class="flame-ring">
          <div class="flame-ring-inner">
            <div class="avatar-pic">🧑</div>
          </div>
        </div>
        <div class="wings"></div>
      </div>
      <div class="user-info">
        <div class="user-name">
          <span class="rank-num">¹</span>
          Shehab
          <span class="gender-icon">♂</span>
        </div>
        <div class="badges-line">
          <div class="diamond-badge"><span>💎</span> 6</div>
          <div class="calm-badge">CALM</div>
        </div>
        <div class="user-id">
          ID: 98689599
          <button class="copy-btn" onclick="navigator.clipboard.writeText('98689599')">⎘</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-value">154</div>
        <div class="stat-label">Games</div>
      </div>
      <div class="stat">
        <div class="stat-value">61.7%</div>
        <div class="stat-label">Winning Rates</div>
      </div>
    </div>

    <!-- Gift button -->
    <button class="gift-btn">🎁 Send Gift</button>
  </div>

</div>

</body>
</html>
